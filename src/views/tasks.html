<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tareas - MagnusPanel</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
.sidebar{width:250px;height:100vh;background:#111827;position:fixed;padding:20px}
.sidebar h2{color:#3b82f6}
.sidebar a{display:block;color:white;text-decoration:none;margin-top:15px;padding:10px;border-radius:10px;background:#1f2937}
.sidebar a:hover{background:#374151}
.main{margin-left:270px;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:15px;margin-top:20px}
input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}
button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  margin-top:10px;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
th,td{
  padding:12px;
  border-bottom:1px solid #334155;
  text-align:left;
}
.badge{
  padding:5px 10px;
  border-radius:8px;
  background:#16a34a;
}
.off{
  background:#dc2626;
}
</style>

</head>

<body>

<div class="sidebar">

  <h2>MagnusPanel</h2>

  <a href="/dashboard">🏠 Dashboard</a>
  <a href="/users">👥 Usuarios</a>
  <a href="/bots">🤖 Mis Bots</a>
  <a href="/channels">📢 Canales</a>
  <a href="/tasks">⏱️ Tareas</a>
  <a href="/payments">💰 Pagos</a>
  <a href="/keys">🔑 Keys</a>
  <a href="/plans">📦 Planes</a>
  <a href="/logs">📜 Logs</a>
  <a href="/settings">⚙️ Config</a>
  <a href="/logout">🚪 Logout</a>

</div>

<div class="main">

  <h1>⏱️ Tareas Automáticas</h1>

  <div class="card">

    <h2>Crear tarea</h2>

    <form method="POST" action="/tasks/create">

      <select name="channel_id" required>
        {{CHANNEL_OPTIONS}}
      </select>

      <textarea
        name="message"
        rows="6"
        placeholder="Mensaje automático..."
        required
      ></textarea>

      <select name="cron_time" required>

        <option value="*/5 * * * *">
          Cada 5 minutos
        </option>

        <option value="*/10 * * * *">
          Cada 10 minutos
        </option>

        <option value="*/30 * * * *">
          Cada 30 minutos
        </option>

        <option value="0 * * * *">
          Cada hora
        </option>

      </select>

      <button type="submit">
        Crear tarea
      </button>

    </form>

  </div>

  <div class="card">

    <h2>Tareas creadas</h2>

    <table>

      <thead>

        <tr>
          <th>ID</th>
          <th>Canal</th>
          <th>Mensaje</th>
          <th>Frecuencia</th>
          <th>Estado</th>
          <th>Acción</th>
        </tr>

      </thead>

      <tbody>

        {{TASKS}}

      </tbody>

    </table>

  </div>

</div>

</body>
</html>
