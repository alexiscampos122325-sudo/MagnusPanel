<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pagos - MagnusPanel</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
.sidebar{width:250px;height:100vh;background:#111827;position:fixed;padding:20px}
.sidebar h2{color:#3b82f6}
.sidebar a{display:block;color:white;text-decoration:none;margin-top:15px;padding:10px;border-radius:10px;background:#1f2937}
.sidebar a:hover{background:#374151}
.main{margin-left:270px;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:15px;margin-top:20px}
input,select{width:100%;padding:10px;margin-top:10px;border:none;border-radius:8px}
button{padding:10px 15px;border:none;border-radius:8px;background:#2563eb;color:white;cursor:pointer;margin-top:10px}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{padding:12px;border-bottom:1px solid #334155;text-align:left}
.badge{padding:5px 10px;border-radius:8px;background:#2563eb}
.pending{background:#f59e0b}
.approved{background:#16a34a}
.rejected{background:#dc2626}
</style>
</head>

<body>

<div class="sidebar">
  <h2>MagnusPanel</h2>

  <a href="/dashboard">🏠 Dashboard</a>
  <a href="/users">👥 Usuarios</a>
  <a href="/bots">🤖 Bots</a>
  <a href="/channels">📢 Canales</a>
  <a href="/tasks">⏱️ Tareas</a>
  <a href="/logs">📜 Logs</a>
  <a href="/payments">💰 Pagos</a>
  <a href="/keys">🔑 Keys</a>
  <a href="/plans">📦 Planes</a>
  <a href="/settings">⚙️ Config</a>
  <a href="/logout">🚪 Logout</a>

</div>

<div class="main">

  <h1>💰 Pagos</h1>

  <div class="card">

    <h2>Comprar plan</h2>

    <form
      method="POST"
      action="/payments/create"
      enctype="multipart/form-data"
    >

      <select name="plan_id" required>
        {{PLAN_OPTIONS}}
      </select>

      <input
        type="file"
        name="proof"
        accept="image/*"
        required
      >

      <button type="submit">
        Enviar pago
      </button>

    </form>

  </div>

  <div class="card">

    <h2>Pagos registrados</h2>

    <table>

      <thead>

        <tr>
          <th>ID</th>
          <th>Usuario</th>
          <th>Plan</th>
          <th>Monto</th>
          <th>Comprobante</th>
          <th>Estado</th>
          <th>Fecha</th>
          <th>Acción</th>
        </tr>

      </thead>

      <tbody>

        {{PAYMENTS}}

      </tbody>

    </table>

  </div>

</div>

</body>
</html>
