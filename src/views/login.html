<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MagnusPanel Login</title>

  <style>

    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:#1e293b;
      padding:30px;
      border-radius:15px;
      width:300px;
    }

    input{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:10px;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:15px;
      border:none;
      border-radius:10px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

  </style>

</head>
<body>

  <div class="box">

    <h2>MagnusPanel</h2>

    <form method="POST" action="/login">

      <input
        type="text"
        name="username"
        placeholder="Usuario"
        required
      >

      <input
        type="password"
        name="password"
        placeholder="Contraseña"
        required
      >

      <button type="submit">
        Ingresar
      </button>

    </form>

  </div>

</body>
</html>
