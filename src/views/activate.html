<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Activar Key</title>

<style>

body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  width:350px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

  <h2>🔑 Activar Membresía</h2>

  <form method="POST" action="/activate">

    <input
      type="text"
      name="license_key"
      placeholder="MAGNUS-XXXX"
      required
    >

    <button type="submit">
      Activar
    </button>

  </form>

</div>

</body>
</html>
