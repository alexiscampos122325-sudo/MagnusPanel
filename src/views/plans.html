<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Planes</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.sidebar{
  width:250px;
  height:100vh;
  background:#111827;
  position:fixed;
  padding:20px;
}

.sidebar h2{
  color:#3b82f6;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  margin-top:15px;
  padding:10px;
  border-radius:10px;
  background:#1f2937;
}

.main{
  margin-left:270px;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #334155;
}

.badge{
  background:#2563eb;
  padding:5px 10px;
  border-radius:8px;
}

</style>

</head>

<body>

<div class="sidebar">

  <h2>MagnusPanel</h2>

  <a href="/dashboard">🏠 Dashboard</a>
  <a href="/users">👥 Usuarios</a>
  <a href="/payments">💰 Pagos</a>
  <a href="/keys">🔑 Keys</a>
  <a href="/plans">📦 Planes</a>
  <a href="/logs">📜 Logs</a>
  <a href="/settings">⚙️ Config</a>
  <a href="/logout">🚪 Logout</a>

</div>

<div class="main">

  <h1>📦 Planes</h1>

  <div class="card">

    <table>

      <thead>

        <tr>
          <th>ID</th>
          <th>Plan</th>
          <th>Bots</th>
          <th>Canales</th>
          <th>Tareas</th>
          <th>Días</th>
          <th>Precio</th>
        </tr>

      </thead>

      <tbody>

        {{PLANS}}

      </tbody>

    </table>

  </div>

</div>

</body>
</html>
